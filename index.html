<!DOCTYPE html>
<html>
<head>
<title>AI Kvitterings bogføring</title>
</head>

<body>

<h1>Upload kvittering</h1>

<input type="file" id="receiptImage" />

<button onclick="uploadReceipt()">Analyser kvittering</button>

<p id="result"></p>

<script>
async function uploadReceipt() {
    // Hent filen (i første omgang bruges kun filnavn til test)
    let file = document.getElementById("receiptImage").files[0];
    if (!file) {
        document.getElementById("result").innerText = "Vælg venligst en fil først.";
        return;
    }

    let formData = new FormData();
    // Send faktisk fil til backend
    formData.append("file", file);

    try {
        let response = await fetch("/api/analyze", {
            method: "POST",
            body: formData
        });

        let data = await response.json();

        // Brug 'result', som din backend faktisk returnerer
        document.getElementById("result").innerText = data.result;

    } catch (error) {
        document.getElementById("result").innerText = "Fejl: " + error;
    }
}
</script>

</body>
</html>
