<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kvitteringsanalyse</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #F5F2EC;
  --ink: #1A1814;
  --accent: #2D5A3D;
  --accent-light: #E8F0EA;
  --muted: #8A8780;
  --border: #D8D4CC;
  --white: #FDFCFA;
  --error: #C0392B;
  --serif: 'Instrument Serif', Georgia, serif;
  --mono: 'DM Mono', monospace;
}

body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--mono);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 3rem 1.5rem;
}

header { text-align: center; margin-bottom: 3rem; }

.eyebrow {
  font-size: .7rem;
  letter-spacing: .2em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: .75rem;
}

h1 {
  font-family: var(--serif);
  font-size: clamp(2.2rem, 5vw, 3.5rem);
  font-weight: 400;
  line-height: 1.1;
}

h1 em { font-style: italic; color: var(--accent); }

.subtitle {
  margin-top: .75rem;
  font-size: .8rem;
  color: var(--muted);
}

.card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 2px;
  width: 100%;
  max-width: 560px;
  padding: 2.5rem;
  box-shadow: 4px 4px 0px var(--border);
  margin-bottom: 2rem;
}

.drop-zone {
  border: 1.5px dashed var(--border);
  padding: 2.5rem 1.5rem;
  text-align: center;
  cursor: pointer;
  background: var(--bg);
  position: relative;
  transition: all .2s;
}

.drop-zone:hover, .drop-zone.dragover {
  border-color: var(--accent);
  background: var(--accent-light);
}

.drop-zone input {
  position: absolute;
  inset: 0;
  opacity: 0;
  cursor: pointer;
  width: 100%;
  height: 100%;
}

.drop-icon { font-size: 2rem; display: block; margin-bottom: .5rem; }
.drop-label { font-family: var(--serif); font-size: 1.1rem; display: block; margin-bottom: .3rem; }
.drop-hint { font-size: .72rem; color: var(--muted); }

.preview-wrap { display: none; margin-top: 1.25rem; position: relative; }

.preview-wrap img {
  width: 100%;
  max-height: 220px;
  object-fit: cover;
  border: 1px solid var(--border);
  display: block;
}

.btn-remove {
  position: absolute;
  top: .5rem;
  right: .5rem;
  background: var(--ink);
  color: white;
  border: none;
  border-radius: 50%;
  width: 1.6rem;
  height: 1.6rem;
  font-size: .8rem;
  cursor: pointer;
}

.btn-analyze {
  margin-top: 1.5rem;
  width: 100%;
  padding: .9rem 1.5rem;
  background: var(--accent);
  color: white;
  border: none;
  font-family: var(--mono);
  font-size: .8rem;
  letter-spacing: .12em;
  text-transform: uppercase;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: .5rem;
  transition: all .2s;
}

.btn-analyze:hover:not(:disabled) { background: #1e3f2a; }
.btn-analyze:disabled { opacity: .5; cursor: not-allowed; }

.spinner {
  width: 14px;
  height: 14px;
  border: 2px solid rgba(255,255,255,.3);
  border-top-color: white;
  border-radius: 50%;
  animation: spin .7s linear infinite;
  display: none;
}

@keyframes spin { to { transform: rotate(360deg); } }

.error-msg {
  margin-top: 1rem;
  font-size: .8rem;
  color: var(--error);
  padding: .75rem 1rem;
  background: #fdf0ef;
  border-left: 3px solid var(--error);
  display: none;
}

.result-section { display: none; margin-top: 2rem; border-top: 1px solid var(--border); padding-top: 2rem; }
.section-label { font-size: .68rem; letter-spacing: .18em; text-transform: uppercase; color: var(--muted); margin-bottom: 1rem; }
.result-grid { display: grid; gap: .6rem; }

.result-row {
  display: flex;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
  padding: .6rem 0;
  gap: 1rem;
}

.result-row:last-child { border-bottom: none; }

.row-key { font-size: .7rem; color: var(--muted); letter-spacing: .1em; flex-shrink: 0; }
.row-val { font-family: var(--serif); font-size: 1rem; text-align: right; }
.row-val.amount { color: var(--accent); font-size: 1.2rem; }

.receipts-list { margin-top: 1rem; }

.receipt-item {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  padding: .75rem 0;
  border-bottom: 1px solid var(--border);
  gap: 1rem;
}

.receipt-item:last-child { border-bottom: none; }
.receipt-meta { font-size: .72rem; color: var(--muted); margin-top: .2rem; }
.receipt-amount { font-family: var(--serif); font-size: 1.1rem; color: var(--accent); white-space: nowrap; }

.empty-state { font-size: .8rem; color: var(--muted); text-align: center; padding: 2rem 0; }

footer { margin-top: 3rem; font-size: .7rem; color: var(--muted); text-align: center; }
</style>
</head>
<body>

<header>
  <p class="eyebrow">AI · Bogføring</p>
  <h1>Analyser din<br><em>kvittering</em></h1>
  <p class="subtitle">Upload et billede — vi udtrækker dato, beløb og kategori</p>
</header>

<div class="card">
  <div class="drop-zone" id="dropZone">
    <input type="file" id="receiptImage" accept="image/*" onchange="handleFile(this.files[0])">
    <span class="drop-icon">🧾</span>
    <span class="drop-label">Træk kvittering hertil</span>
    <span class="drop-hint">eller klik for at vælge · JPG, PNG, WEBP</span>
  </div>

  <div class="preview-wrap" id="previewWrap">
    <img id="previewImg" src="" alt="Preview">
    <button class="btn-remove" onclick="removeFile()">✕</button>
  </div>

  <button class="btn-analyze" id="analyzeBtn" onclick="uploadReceipt()" disabled>
    <span class="spinner" id="spinner"></span>
    <span id="btnText">Analyser kvittering</span>
  </button>

  <div class="error-msg" id="errorMsg"></div>

  <div class="result-section" id="resultSection">
    <p class="section-label">Resultat</p>
    <div class="result-grid" id="resultGrid"></div>
  </div>
</div>

<div class="card">
  <p class="section-label">Mine kvitteringer</p>
  <div class="receipts-list" id="receiptsList">
    <p class="empty-state">Henter kvitteringer...</p>
  </div>
</div>

<footer>Drevet af OpenAI Vision · Data gemmes ikke eksternt</footer>

<script>
const LABELS = {
  dato: 'Dato',
  leverandør: 'Leverandør',
  beløb_inkl_moms: 'Beløb inkl. moms',
  moms: 'Moms',
  moms_procent: 'Momssats',
  kategori: 'Kategori',
  betalingsmetode: 'Betalingsmetode',
  valuta: 'Valuta'
};

let currentFile = null;

const dropZone = document.getElementById('dropZone');
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
});

function handleFile(file) {
  if (!file) return;
  if (!file.type.startsWith('image/')) { showError('Kun billedfiler er tilladt (JPG, PNG, WEBP)'); return; }
  if (file.size > 10 * 1024 * 1024) { showError('Filen er for stor — maks 10MB'); return; }
  currentFile = file;
  const reader = new FileReader();
  reader.onload = e => {
    document.getElementById('previewImg').src = e.target.result;
    document.getElementById('previewWrap').style.display = 'block';
    document.getElementById('analyzeBtn').disabled = false;
    document.getElementById('errorMsg').style.display = 'none';
    document.getElementById('resultSection').style.display = 'none';
  };
  reader.readAsDataURL(file);
}

function removeFile() {
  currentFile = null;
  document.getElementById('previewWrap').style.display = 'none';
  document.getElementById('analyzeBtn').disabled = true;
  document.getElementById('receiptImage').value = '';
  document.getElementById('resultSection').style.display = 'none';
  document.getElementById('errorMsg').style.display = 'none';
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.style.display = 'block';
}

async function uploadReceipt() {
  if (!currentFile) return;
  const spinner = document.getElementById('spinner');
  const btnText = document.getElementById('btnText');
  const btn = document.getElementById('analyzeBtn');

  btn.disabled = true;
  spinner.style.display = 'block';
  btnText.textContent = 'Analyserer...';
  document.getElementById('errorMsg').style.display = 'none';

  try {
    const formData = new FormData();
    formData.append('file', currentFile);
    const res = await fetch('/api/analyze', { method: 'POST', body: formData });
    const text = await res.text();
    if (!res.ok) throw new Error(text || 'Serverfejl');
    renderResult(text);
    loadReceipts();
  } catch (err) {
    showError('Fejl: ' + err.message);
  } finally {
    btn.disabled = false;
    spinner.style.display = 'none';
    btnText.textContent = 'Analyser igen';
  }
}

function renderResult(text) {
  const grid = document.getElementById('resultGrid');
  const section = document.getElementById('resultSection');
  grid.innerHTML = '';

  try {
    const clean = text.replace(/```json|```/g, '').trim();
    const data = JSON.parse(clean);

    for (const [key, label] of Object.entries(LABELS)) {
      if (data[key] == null) continue;
      const row = document.createElement('div');
      row.className = 'result-row';
      const isAmount = key === 'beløb_inkl_moms' || key === 'moms';
      const isMomsPct = key === 'moms_procent';
      const val = typeof data[key] === 'number'
        ? data[key].toLocaleString('da-DK', { minimumFractionDigits: 2 }) + (isAmount ? ' kr.' : isMomsPct ? '%' : '')
        : data[key];
      row.innerHTML = `<span class="row-key">${label}</span><span class="row-val ${isAmount ? 'amount' : ''}">${val}</span>`;
      grid.appendChild(row);
    }
  } catch {
    grid.innerHTML = `<pre style="font-size:.75rem;white-space:pre-wrap">${text}</pre>`;
  }

  section.style.display = 'block';
}

async function loadReceipts() {
  const list = document.getElementById('receiptsList');
  try {
    const res = await fetch('/api/receipts');
    if (!res.ok) throw new Error();
    const receipts = await res.json();

    if (!receipts.length) {
      list.innerHTML = '<p class="empty-state">Ingen kvitteringer endnu</p>';
      return;
    }

    list.innerHTML = receipts.map(r => {
      const amount = r.amount
        ? Number(r.amount).toLocaleString('da-DK', { minimumFractionDigits: 2 }) + ' kr.'
        : '';
      const date = r.date
        ? new Date(r.date).toLocaleDateString('da-DK', { day: 'numeric', month: 'short', year: 'numeric' })
        : '';
      return `
        <div class="receipt-item" data-id="${r.id}">
          <div style="flex:1">
            <div style="display:flex;justify-content:space-between;align-items:baseline">
              <strong>${r.vendor || 'Ukendt leverandør'}</strong>
              <div class="receipt-amount">${amount}</div>
            </div>
            <div class="receipt-meta">${date}</div>

            <div class="edit-fields" style="margin-top:8px;display:grid;gap:4px">

              <div class="edit-row">
                <label>Leverandør</label>
                <input value="${r.vendor || ''}" onchange="updateField('${r.id}', 'vendor', this.value, this)">
              </div>

              <div class="edit-row">
                <label>Kategori</label>
                <input value="${r.category || ''}" onchange="updateField('${r.id}', 'category', this.value, this)">
              </div>

              <div class="edit-row">
                <label>Dato</label>
                <input type="date" value="${r.date || ''}" onchange="updateField('${r.id}', 'date', this.value, this)">
              </div>

              <div class="edit-row">
                <label>Konto</label>
                <input value="${r.account || ''}" placeholder="fx 3000" onchange="updateField('${r.id}', 'account', this.value, this)">
              </div>

              <span id="status-${r.id}" style="font-size:10px;height:14px;display:block"></span>
            </div>
          </div>
        </div>`;
    }).join('');

  } catch {
    list.innerHTML = '<p class="empty-state">Kunne ikke hente kvitteringer</p>';
  }
}

async function updateField(id, field, value, inputEl) {
  const statusEl = document.getElementById('status-' + id);
  try {
    const res = await fetch('/api/update-receipt', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id, [field]: value })
    });

    if (!res.ok) throw new Error();

    inputEl.style.borderColor = '#2D5A3D';
    statusEl.textContent = '✓ Gemt';
    statusEl.style.color = '#2D5A3D';
    setTimeout(() => {
      inputEl.style.borderColor = '';
      statusEl.textContent = '';
    }, 2000);

  } catch {
    inputEl.style.borderColor = '#C0392B';
    statusEl.textContent = '✗ Fejl ved gemning';
    statusEl.style.color = '#C0392B';
  }
}

loadReceipts();
</script>
</body>
</html>
